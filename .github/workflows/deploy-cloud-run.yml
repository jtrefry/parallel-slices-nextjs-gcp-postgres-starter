name: Deploy Cloud Run

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Quality
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloud-run-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      ((github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success')) &&
      vars.GCP_PROJECT_ID != '' &&
      vars.GCP_REGION != '' &&
      vars.GCP_ARTIFACT_REPOSITORY != '' &&
      vars.GCP_IMAGE_NAME != '' &&
      vars.GCP_CLOUD_RUN_SERVICE != '' &&
      vars.GCP_WIF_PROVIDER != '' &&
      vars.GCP_DEPLOY_SERVICE_ACCOUNT != '' &&
      vars.GCP_RUNTIME_SERVICE_ACCOUNT != '' &&
      vars.GCP_CLOUD_SQL_INSTANCE != '' &&
      vars.GCP_DATABASE_URL_SECRET != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Check out the quality-gated revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate for Artifact Registry without a workspace credential file
        id: registry-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token
          create_credentials_file: false
          export_environment_variables: false

      - name: Log in to Artifact Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.registry-auth.outputs.access_token }}

      - name: Define immutable image name
        id: image
        shell: bash
        env:
          REVISION_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: >-
          echo "name=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPOSITORY }}/${{ vars.GCP_IMAGE_NAME }}:${REVISION_SHA}"
          >> "$GITHUB_OUTPUT"

      - name: Build and push container
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ vars.DOCKER_CONTEXT || '.' }}
          file: ${{ vars.DOCKERFILE || 'Dockerfile' }}
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.image.outputs.name }}

      - name: Authenticate for Cloud Run deployment
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Deploy immutable revision to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
          image: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
          flags: >-
            --service-account=${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
            --add-cloudsql-instances=${{ vars.GCP_CLOUD_SQL_INSTANCE }}
            --set-secrets=DATABASE_URL=${{ vars.GCP_DATABASE_URL_SECRET }}:latest

      - name: Record deployed service URL
        run: echo "Deployed ${{ steps.deploy.outputs.url }}"
